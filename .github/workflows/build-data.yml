name: Rebuild Model Data

on:
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "scripts/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build model data
        run: python scripts/build_model.py

      - name: Verify output exists
        run: |
          test -f public/data/teams.json
          test -f public/data/scorers.json
          test -f public/data/model.json
          test -f public/data/liveState.json
